name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  golangci:
    strategy:
      matrix:
        # Currently having linter issues with 1.23.0.
        go: ['1.19', '1.22.6']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go }}
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
